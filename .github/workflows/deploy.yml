name: Build & Deploy to OSS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install ossutil v2
        run: |
          curl -Lo ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip
          unzip ossutil.zip
          chmod +x ossutil-2.2.1-linux-amd64/ossutil
          sudo mv ossutil-2.2.1-linux-amd64/ossutil /usr/local/bin/ossutil
          ossutil version

      - name: Deploy to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: https://oss-cn-hangzhou.aliyuncs.com
          OSS_REGION: cn-hangzhou
        run: |
          CREDS="--endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET --region $OSS_REGION"

          # 同步前端资源
          ossutil sync ./dist/ oss://amazingindex/ \
            --force \
            --delete \
            --exclude "api/*" \
            --exclude "image/*" \
            --exclude "sitemap.xml" \
            --exclude "robots.txt" \
            $CREDS

          # HTML 文件设置 no-cache
          find ./dist -name "*.html" | while read f; do
            key="${f#./dist/}"
            ossutil cp "$f" "oss://amazingindex/$key" \
              --force \
              --metadata "Cache-Control=no-cache" \
              --content-type "text/html; charset=utf-8" \
              $CREDS
          done

          # JS/CSS 长期缓存
          if [ -d "./dist/assets" ]; then
            ossutil sync ./dist/assets/ oss://amazingindex/assets/ \
              --force \
              --metadata "Cache-Control=max-age=31536000" \
              $CREDS
          fi

      - name: Deployment summary
        run: |
          echo "✅ Deployed to OSS"
          echo "HTML pages: $(find ./dist -name '*.html' | wc -l)"
          echo "Asset files: $(find ./dist/assets -type f 2>/dev/null | wc -l)"
      - name: Refresh CDN (homepage)
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          pip install alibabacloud_cdn20180510 --quiet
          python3 - <<'EOF'
          import os
          from alibabacloud_cdn20180510.client import Client
          from alibabacloud_cdn20180510 import models as cdn_models
          from alibabacloud_tea_openapi import models as open_api_models

          config = open_api_models.Config(
              access_key_id=os.environ['ALIBABA_CLOUD_ACCESS_KEY_ID'],
              access_key_secret=os.environ['ALIBABA_CLOUD_ACCESS_KEY_SECRET'],
              endpoint='cdn.aliyuncs.com'
          )
          client = Client(config)

          urls = [
              'https://www.amazingindex.com/',
              'https://www.amazingindex.com/index.html',
          ]

          request = cdn_models.RefreshObjectCachesRequest(
              object_path='\n'.join(urls),
              object_type='File'
          )
          client.refresh_object_caches(request)
          print(f"✅ CDN refreshed: {len(urls)} URLs")
          EOF